<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - SKUNKIN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>
    
    <div class="cart-page">
        <h1>Shopping Cart</h1>
        
        <div class="cart-layout">
            <div class="cart-items">
                <!-- Cart Item 1 -->
                <div class="cart-item">
                    <img src="hero-image-2.jpg" alt="Product">
                    <div class="item-details">
                        <h3>Cyber Reaper Design</h3>
                        <p>Size: M | Color: Black | Material: Cotton</p>
                        <p class="item-price">$29.99</p>
                    </div>
                    <div class="item-quantity">
                        <button onclick="updateCartQty(1, -1)">-</button>
                        <span>1</span>
                        <button onclick="updateCartQty(1, 1)">+</button>
                    </div>
                    <button class="remove-btn" onclick="removeFromCart(1)">🗑️</button>
                </div>
                
                <!-- Empty cart message (hidden when items present) -->
                <div class="empty-cart" style="display: none;">
                    <p>Your cart is empty</p>
                    <a href="products.html" class="btn-primary">Shop Now</a>
                </div>
            </div>
            
            <div class="cart-summary">
                <h2>Order Summary</h2>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span>$29.99</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span>FREE</span>
                </div>
                <div class="summary-row">
                    <span>Tax (estimated)</span>
                    <span>$2.40</span>
                </div>
                <hr>
                <div class="summary-row total">
                    <span>Total</span>
                    <span>$32.39</span>
                </div>
                
                <button class="btn-primary checkout-btn" onclick="goToCheckout()">
                    Proceed to Checkout
                </button>
                
                <div class="promo-code">
                    <input type="text" placeholder="Promo code">
                    <button>Apply</button>
                </div>
                
                <div class="payment-badges">
                    <span>💳</span>
                    <span>🅿️</span>
                    <span>🍎</span>
                    <span>🔒</span>
                </div>
            </div>
        </div>
    </div>
    
    <div id="footer-placeholder"></div>
    
    <script src="main.js"></script>
</body>
</html>
